# Configuration de déploiement Azure pour IVOKA
# Ce fichier peut être utilisé avec Azure DevOps ou GitHub Actions

name: Deploy IVOKA to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: ivoka-webapp
  AZURE_WEBAPP_PACKAGE_PATH: './backend/target'
  JAVA_VERSION: '11'
  NODE_VERSION: '16'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build
    
    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: frontend/build/

  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build with Maven
      run: |
        cd backend
        mvn clean package -DskipTests
    
    - name: Upload backend artifacts
      uses: actions/upload-artifact@v3
      with:
        name: backend-build
        path: backend/target/*.war

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    
    steps:
    - name: Download frontend artifacts
      uses: actions/download-artifact@v3
      with:
        name: frontend-build
        path: frontend-build
    
    - name: Download backend artifacts
      uses: actions/download-artifact@v3
      with:
        name: backend-build
        path: backend-build
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: backend-build
    
    - name: Deploy frontend to Azure Storage
      uses: azure/CLI@v1
      with:
        azcliversion: 2.30.0
        inlineScript: |
          az storage blob upload-batch \
            --account-name ivokastorage \
            --account-key ${{ secrets.AZURE_STORAGE_KEY }} \
            --source frontend-build \
            --destination \$web \
            --overwrite

  deploy-mysql:
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup MySQL
      uses: mirromutth/mysql-action@v1.1
      with:
        host: ${{ secrets.AZURE_MYSQL_HOST }}
        port: 3306
        user: ${{ secrets.AZURE_MYSQL_USER }}
        password: ${{ secrets.AZURE_MYSQL_PASSWORD }}
        database: ivoka_db
    
    - name: Execute database schema
      run: |
        mysql -h ${{ secrets.AZURE_MYSQL_HOST }} \
              -u ${{ secrets.AZURE_MYSQL_USER }} \
              -p${{ secrets.AZURE_MYSQL_PASSWORD }} \
              ivoka_db < backend/src/main/resources/schema.sql